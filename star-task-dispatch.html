function textHash(text){return Array.from(text).reduce((sum,char)=>sum+char.charCodeAt(0),0)}
const projectCatalog = Object.fromEntries(Object.entries(projectRegionCatalog).flatMap(([region, projects], regionIndex) => projects.map((project, projectIndex) => {
  const seed = textHash(`${region}-${project}`);
  const target = (3 + (seed % 4) / 10).toFixed(1);
  return [`${region}||${project}`, {
    region,
    project,
    owner: `${project}数字化专班`,
    code: `PRJ-${String(regionIndex + 1).padStart(2, "0")}-${String(projectIndex + 1).padStart(2, "0")}`,
    target: `项目星级指数 ${target}`,
    parentGoal: `东部大区十五五末数字化星级目标星级指数达到3.0（${project}承接目标：项目星级指数达到${target}）`,
    yearSpecs: [

function statusFor(year,monthIndex,categoryIndex,key){const seed=textHash(key);const doingStart=3+(seed%3);const riskMonths=[(seed+2)%12,(seed+7)%12];if(year===2026){if(monthIndex<=doingStart-1)return"done";if(riskMonths.includes(monthIndex)&&categoryIndex===(seed+monthIndex)%6)return"risk";if(monthIndex<=8)return"doing";return"plan"}if(year===2027){if(monthIndex<3)return"doing";if(riskMonths.includes(monthIndex)&&categoryIndex===(seed+monthIndex)%6)return"risk"}return"plan"}
function statusText(s){return{done:"已完成",doing:"推进中",risk:"有风险",plan:"未开始"}[s]}function statusClass(s){return"s-"+s}function progressByStatus(s,seed=0){if(s==="done")return 100;if(s==="doing")return 42+(seed*9)%36;if(s==="risk")return 33+(seed*8)%26;return 0}function aggregateStatus(arr){if(arr.includes("risk"))return"risk";if(arr.length&&arr.every(s=>s==="done"))return"done";if(arr.some(s=>s==="doing"))return"doing";return"plan"}function averageProgress(items){return Math.round(items.reduce((sum,item)=>sum+item.progress,0)/Math.max(items.length,1))}function leafCount(node){if(!node.children||!node.children.length)return node.type==="task"?1:0;return node.children.reduce((sum,child)=>sum+leafCount(child),0)}function ownerFor(project,i){return[project.owner,project.region+"数字化条线","运营管理部","设备/工艺协同组"][i%4]}
function buildProjectTree(key){const project=projectCatalog[key];const rootNode={id:"root",type:"root",name:project.parentGoal,code:project.code,status:"doing",progress:52,target:project.target,owner:project.owner,due:"2028-12-31",description:"该项目承接东部大区数字化星级总体目标，通过年度任务、月度任务、基本任务分类和任务主体逐级拆解。",children:[]};project.yearSpecs.forEach(ys=>{const yNode={id:"y"+ys.year,type:"year",year:ys.year,name:`${ys.year}年度任务｜${ys.name}（目标指数 ${ys.target}）`,code:`${project.code}-${ys.year}`,status:ys.status,progress:ys.progress,target:`星级指数 ${ys.target}`,owner:project.owner,due:`${ys.year}-12-31`,description:`承接项目总体目标，完成${ys.year}年度阶段目标：${ys.name}。`,children:[]};monthNames.forEach((mn,mi)=>{const categoryStatuses=categories.map((_,ci)=>statusFor(ys.year,mi,ci,key));const mNode={id:`y${ys.year}m${mi+1}`,type:"month",year:ys.year,month:mi+1,name:`${mn}度任务｜${monthThemes[mi]}`,code:`${project.code}-${ys.year}-${String(mi+1).padStart(2,"0")}`,status:aggregateStatus(categoryStatuses),progress:0,target:`完成${monthThemes[mi]}`,owner:mi%2===0?project.owner:project.region+"协同组",due:`${ys.year}-${String(mi+1).padStart(2,"0")}-${[31,28,31,30,31,30,31,31,30,31,30,31][mi]}`,description:`围绕${ys.year}年度目标，完成${mn}${monthThemes[mi]}的月度任务。`,children:[]};categories.forEach((cat,ci)=>{const cNode={id:`${mNode.id}c${ci+1}`,type:"category",year:ys.year,month:mi+1,name:cat.name,shortName:cat.name,code:`${mNode.code}-C${ci+1}`,status:categoryStatuses[ci],progress:0,target:cat.target,owner:ownerFor(project,ci),due:mNode.due,description:`${cat.name}仅作为${mn}基本任务分类框使用，下方任务主体才是年度任务血缘追踪的最小任务单元。${cat.target}。`,roles:["项目负责人","业务责任人","数据责任人","审核人"],children:[]};cat.subjects.forEach((subject,si)=>{const s=cNode.status;cNode.children.push({id:`${cNode.id}s${si+1}`,type:"task",year:ys.year,month:mi+1,name:subject,shortName:subject,code:`${mNode.code}-T${ci+1}.${si+1}`,status:s,progress:progressByStatus(s,mi+ci+si),target:`${cat.target} - ${subject}`,owner:ownerFor(project,ci+si),due:mNode.due,description:`${subject}是“${cat.name}”分类下的任务主体，也是年度任务中的最小任务单元，服务于${project.project}${mn}“${monthThemes[mi]}”。`,roles:["项目负责人","业务责任人","数据责任人","审核人"],children:[]})});cNode.progress=averageProgress(cNode.children);cNode.status=aggregateStatus(cNode.children.map(child=>child.status));mNode.children.push(cNode)});mNode.progress=averageProgress(mNode.children);mNode.status=aggregateStatus(mNode.children.map(child=>child.status));yNode.children.push(mNode)});rootNode.children.push(yNode)});return rootNode}
function buildIndex(node,parent=null){index[node.id]=node;if(parent)parentIndex[node.id]=parent.id;(node.children||[]).forEach(c=>buildIndex(c,node))}function countNodes(node){return 1+(node.children||[]).reduce((s,c)=>s+countNodes(c),0)}function updateHeader(){document.getElementById("treeCount").textContent=`${countNodes(root)} 个节点`}function iconText(type){return{root:"总",year:"年",month:"月",category:"类",task:"项"}[type]}function nodeMeta(n){if(n.type==="root")return`${n.code} · 项目总目标`;if(n.type==="year")return`${n.code} · 12个月度任务`;if(n.type==="month")return`${n.code} · ${n.children.length}类基本任务 · ${leafCount(n)}项任务主体`;if(n.type==="category")return`${n.code} · ${n.children.length}项任务主体`;return`${n.code} · ${n.owner}`}function pathFor(id){const arr=[];let cur=id;while(cur){arr.unshift(index[cur]);cur=parentIndex[cur]}return arr}
function renderTree(){const q=document.getElementById("searchInput").value.trim().toLowerCase();const yf=document.getElementById("yearFilter").value;const sf=document.getElementById("statusFilter").value;function matches(n){return(!q||(n.name+n.code+n.owner).toLowerCase().includes(q))&&(yf==="all"||String(n.year||"")===yf||n.type==="root")&&(sf==="all"||n.status===sf||n.type==="root")}function subtreeMatches(n){return matches(n)||(n.children||[]).some(subtreeMatches)}function create(n){if(!subtreeMatches(n))return null;const wrap=document.createElement("div");wrap.className="tree-node";const row=document.createElement("div");row.className="node-row"+(selectedId===n.id?" selected":"");row.dataset.id=n.id;const has=(n.children||[]).length>0;row.innerHTML=`<div class="toggle">${has?(expanded.has(n.id)?"▾":"▸"):""}</div><div class="node-icon ${n.type}">${iconText(n.type)}</div><div class="node-copy"><div class="node-name" title="${n.name}">${n.name}</div><div class="node-meta">${nodeMeta(n)}</div></div><div class="node-status ${statusClass(n.status)}" title="${statusText(n.status)}"></div>`;row.addEventListener("click",e=>{if(e.target.classList.contains("toggle")&&has){expanded.has(n.id)?expanded.delete(n.id):expanded.add(n.id)}else{selectedId=n.id;let p=n.id;while(parentIndex[p]){expanded.add(parentIndex[p]);p=parentIndex[p]}}renderAll()});wrap.appendChild(row);if(has){const kids=document.createElement("div");kids.className="children"+(expanded.has(n.id)?"":" hidden");n.children.forEach(c=>{const child=create(c);if(child)kids.appendChild(child)});wrap.appendChild(kids)}return wrap}const tree=document.getElementById("tree");tree.innerHTML="";const el=create(root);if(el)tree.appendChild(el)}
function stageCard(node,active=true){return`<div class="main-node ${active?"active":""}" data-id="${node.id}"><h3>${node.name}</h3><div class="meta"><span>${node.code}</span><span>${statusText(node.status)}</span><span>${node.progress}%</span><span>${node.owner}</span></div><div class="progress"><span style="width:${node.progress}%"></span></div></div>`}function branchCard(n,activeId){return`<div class="branch ${n.id===activeId?"active":""}" data-id="${n.id}"><div class="t">${n.shortName||n.name}</div><div class="m">${statusText(n.status)} · ${n.progress}% · ${n.owner}</div></div>`}function categoryGroupMarkup(category,activeId){const active=activeId===category.id||category.children.some(child=>child.id===activeId);return`<div class="task-category-group ${active?"active":""}"><div class="branch category-branch ${activeId===category.id?"active":""}" data-id="${category.id}"><div class="t">${category.name}</div><div class="m">基本任务分类 · ${category.children.length}项任务主体 · ${statusText(category.status)}</div></div><div class="task-subject-grid">${category.children.map(child=>branchCard(child,activeId)).join("")}</div></div>`}
function renderLineage(){const selected=index[selectedId];const path=pathFor(selectedId);const year=path.find(x=>x.type==="year");const month=path.find(x=>x.type==="month");const category=path.find(x=>x.type==="category");const task=path.find(x=>x.type==="task");let html="";html+=`<div class="stage"><div class="stage-index">01</div><div class="stage-label">项目承接父任务</div>${stageCard(root,selected.type==="root")}</div>`;html+=`<div class="stage"><div class="stage-index">02</div><div class="stage-label">年度任务 · 3个阶段</div>${year?stageCard(year,true):`<div class="branch-grid">${root.children.map(n=>branchCard(n,selectedId)).join("")}</div>`}${year&&!focusMode?`<div class="branch-grid">${root.children.map(n=>branchCard(n,year.id)).join("")}</div>`:""}</div>`;html+=`<div class="stage"><div class="stage-index">03</div><div class="stage-label">月度任务 · 每年12项</div>`;if(year){if(month)html+=stageCard(month,true);html+=`<div class="branch-grid">${year.children.map(n=>branchCard(n,month?month.id:selectedId)).join("")}</div>`}else{html+=`<div class="empty-tip">请先选择一个年度任务，查看对应年度的12个月度任务。</div>`}html+=`</div>`;html+=`<div class="stage"><div class="stage-index">04</div><div class="stage-label">基本任务分类 · 任务主体</div>`;if(month){if(task)html+=stageCard(task,true);else if(category)html+=stageCard(category,true);html+=`<div class="category-stack">${month.children.map(n=>categoryGroupMarkup(n,selectedId)).join("")}</div>`}else{html+=`<div class="empty-tip">选择某个月度任务后，将展示四大基本任务分类以及下方任务主体。</div>`}html+=`</div>`;const box=document.getElementById("lineage");box.innerHTML=html;box.querySelectorAll("[data-id]").forEach(el=>el.addEventListener("click",()=>{selectedId=el.dataset.id;let p=selectedId;while(parentIndex[p]){expanded.add(parentIndex[p]);p=parentIndex[p]}renderAll()}))}
function renderDetail(){const n=index[selectedId];const project=projectCatalog[currentProjectKey];const p=parentIndex[n.id]?index[parentIndex[n.id]]:null;const children=n.children||[];const levelLabel={root:"项目父任务",year:"年度任务",month:"月度任务",category:"基本任务分类",task:"任务主体"}[n.type];const downstream=n.type==="month"?`${children.length}类基本任务 / ${leafCount(n)}项任务主体`:n.type==="category"?`${children.length}项任务主体`:children.length?`${children.length}项下级任务`:"无下级任务";const upstream=p?p.name:"无（项目总目标）";const roles=n.roles||["项目负责人","业务归口部门","数据责任人","协同执行单位"];const milestones=n.type==="category"?[["分类框定位","该节点只作为每月基本任务分类使用"],["主体任务挂接","下方任务主体保持为年度任务最小单元"],["进度自动汇总","分类进度由任务主体向上汇总"]]:n.type==="task"?[["任务启动","责任人确认后开始执行"],["过程留痕","上传数据、截图、材料与问题记录"],["完成验收","审核完成后自动汇总至分类和月度任务"]]:[["任务确认","明确目标、责任人和完成口径"],["过程调度","跟踪进度、风险和协同问题"],["结果回写","完成结果向上级任务自动汇总"]];document.getElementById("detail").innerHTML=`<div class="detail-title">${n.name}</div><div class="status-line"><span class="badge ${n.status}">${statusText(n.status)}</span><span class="panel-sub">${project.project} · ${n.code}</span></div><div class="ring-wrap"><div class="ring" style="--p:${n.progress}"><strong>${n.progress}%</strong></div><div class="ring-copy"><div class="big">当前完成进度</div><div class="small">${n.status==="risk"?"存在进度偏差，建议发起专项督办。":"进度将自动向上回写至项目任务树。"}<br>目标：${n.target}</div></div></div><div class="section"><h4>任务属性</h4><div class="kv"><div class="k">所属项目</div><div class="v">${project.region} / ${project.project}</div><div class="k">任务层级</div><div class="v">${levelLabel}</div><div class="k">责任部门</div><div class="v">${n.owner}</div><div class="k">计划完成</div><div class="v">${n.due}</div><div class="k">目标值</div><div class="v">${n.target}</div><div class="k">上游任务</div><div class="v">${upstream}</div><div class="k">下游任务</div><div class="v">${downstream}</div></div></div><div class="section"><h4>任务说明</h4><div style="font-size:12px;line-height:1.7;color:#c9dff4;background:#071f43;border-radius:8px;padding:10px">${n.description}</div></div><div class="section"><h4>责任角色</h4><div class="role-list">${roles.map(r=>`<span class="role">${r}</span>`).join("")}</div></div><div class="section"><h4>关键节点</h4>${milestones.map(m=>`<div class="milestone">${m[0]}<span>${m[1]}</span></div>`).join("")}</div><div class="actions"><button class="primary">发起督办</button><button>调整任务</button><button>新增下级</button><button>查看留痕</button></div><div class="footnote">说明：基本任务分类负责归集，任务主体负责承接年度任务最小任务单元。</div>`}
function renderAll(){renderTree();renderLineage();renderDetail()}function resetProject(key){currentProjectKey=key;root=buildProjectTree(key);index={};parentIndex={};buildIndex(root);expanded=new Set(["root","y2026","y2026m1"]);selectedId="y2026m1";focusMode=false;updateHeader();renderAll()}function initProjectFilter(){const regionSel=document.getElementById("regionFilter");const projectSel=document.getElementById("projectFilter");const setProjects=(region,selectedProject)=>{const projects=projectRegionCatalog[region]||[];projectSel.innerHTML=projects.map(project=>`<option value="${region}||${project}" ${project===selectedProject?"selected":""}>${project}</option>`).join("")};regionSel.innerHTML=Object.keys(projectRegionCatalog).map(region=>`<option value="${region}">${region}</option>`).join("");const [defaultRegion,defaultProject]=currentProjectKey.split("||");regionSel.value=defaultRegion;setProjects(defaultRegion,defaultProject);regionSel.addEventListener("change",e=>{const region=e.target.value;const firstProject=(projectRegionCatalog[region]||[])[0];setProjects(region,firstProject);document.getElementById("searchInput").value="";document.getElementById("yearFilter").value="all";document.getElementById("statusFilter").value="all";resetProject(`${region}||${firstProject}`)});projectSel.addEventListener("change",e=>{document.getElementById("searchInput").value="";document.getElementById("yearFilter").value="all";document.getElementById("statusFilter").value="all";resetProject(e.target.value)})}
document.getElementById("searchInput").addEventListener("input",renderTree);document.getElementById("yearFilter").addEventListener("change",renderTree);document.getElementById("statusFilter").addEventListener("change",renderTree);document.getElementById("collapseBtn").addEventListener("click",()=>{const btn=document.getElementById("collapseBtn");if(expanded.size>1){expanded=new Set(["root"]);btn.textContent="全部展开"}else{expanded=new Set(Object.values(index).filter(n=>(n.children||[]).length).map(n=>n.id));btn.textContent="全部收起"}renderAll()});document.getElementById("showAllBtn").addEventListener("click",()=>{focusMode=false;renderLineage()});document.getElementById("focusBtn").addEventListener("click",()=>{focusMode=true;renderLineage()});initProjectFilter();resetProject(currentProjectKey);
</script>
